 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adarsh | Video Editor</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0d0d0d;
  color:white;
  overflow-x:hidden;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero img {
  width:140px;
  border-radius:50%;
  transform:scale(0.5);
  animation:zoomIn 1s forwards;
}

.hero h1 {
  opacity:0;
  transform:translateY(50px);
  animation:slideUp 1s forwards 0.5s;
}

.hero p {
  opacity:0;
  animation:fadeIn 1s forwards 1s;
}

/* VIDEO GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  padding:40px;
}

iframe {
  width:100%;
  height:200px;
  border-radius:10px;
  opacity:0;
  transform:scale(0.8);
  transition:0.5s;
}

iframe.show {
  opacity:1;
  transform:scale(1);
}

/* BUTTON */
.btn {
  padding:10px 20px;
  background:#f4c430;
  color:black;
  text-decoration:none;
  border-radius:5px;
  margin-top:20px;
}

/* ANIMATIONS */
@keyframes slideUp {
  to {
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes fadeIn {
  to {
    opacity:1;
  }
}

@keyframes zoomIn {
  to {
    transform:scale(1);
  }
}
</style>

</head>

<body>

<div class="hero">
  <img src="https://i.postimg.cc/s2Q16VFr/image.jpg">
  <h1>Adarsh Chaudhary</h1>
  <p>Video Editor | Reels | Ads</p>
  <a class="btn" href="https://wa.me/917827114359">Hire Me</a>
</div>

<div class="grid">
  <iframe src="https://www.youtube.com/embed/Ek-HMXJbPEo"></iframe>
  <iframe src="https://www.youtube.com/embed/rX6_QncJ1zo"></iframe>
  <iframe src="https://www.youtube.com/embed/NMMxot9Wlsc"></iframe>
</div>

<script>
const videos = document.querySelectorAll("iframe");

window.addEventListener("scroll", () => {
  videos.forEach(v => {
    const top = v.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      v.classList.add("show");
    }
  });
});
</script>

</body>
</html>
