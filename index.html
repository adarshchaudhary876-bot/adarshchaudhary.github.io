 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adarsh | Video Editor</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0d0d0d;
  color:white;
  overflow-x:hidden;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  transform:translateY(50px);
  animation:fadeUp 1s forwards;
}

.hero img {
  width:140px;
  border-radius:50%;
}

.hero h1 {
  margin:15px 0;
  font-size:50px;
}

.hero p {
  color:#aaa;
}

/* SECTION */
.section {
  padding:80px 20px;
  text-align:center;
  opacity:0;
  transform:translateY(50px);
  transition:1s;
}

.section.show {
  opacity:1;
  transform:translateY(0);
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  padding:20px;
}

iframe {
  width:100%;
  height:200px;
  border-radius:10px;
  transition:0.3s;
}

iframe:hover {
  transform:scale(1.05);
}

/* BUTTON */
.btn {
  padding:10px 20px;
  background:#f4c430;
  color:black;
  text-decoration:none;
  border-radius:5px;
}

/* ANIMATION */
@keyframes fadeUp {
  to {
    opacity:1;
    transform:translateY(0);
  }
}
</style>

</head>

<body>

<div class="hero">
  <img src="https://i.postimg.cc/s2Q16VFr/image.jpg">
  <h1>Adarsh Chaudhary</h1>
  <p>Video Editor | Reels | Ads</p>
  <a class="btn" href="https://wa.me/917827114359">Hire Me</a>
</div>

<div class="section">
  <h2>🎬 My Work</h2>
  <div class="grid">
    <iframe src="https://www.youtube.com/embed/Ek-HMXJbPEo"></iframe>
    <iframe src="https://www.youtube.com/embed/rX6_QncJ1zo"></iframe>
    <iframe src="https://www.youtube.com/embed/NMMxot9Wlsc"></iframe>
  </div>
</div>

<div class="section">
  <h2>📱 More Work</h2>
  <a class="btn" href="https://www.instagram.com/reel/DOvQuDfEzXS/">View Reel</a>
</div>

<div class="section">
  <h2>About Me</h2>
  <p>Creative video editor with 4+ years experience in reels and ads.</p>
</div>

<script>
const sections = document.querySelectorAll('.section');

window.addEventListener('scroll', () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      sec.classList.add('show');
    }
  });
});
</script>

</body>
</html>
